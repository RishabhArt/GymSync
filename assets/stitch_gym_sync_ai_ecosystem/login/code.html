<body class="bg-background text-on-background min-h-screen flex items-center justify-center overflow-hidden relative font-body-md">
<!-- Ambient Background Lighting -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container opacity-[0.03] rounded-full blur-[120px]"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md px-container-margin md:px-0">
<!-- Logo & Header Section -->
<div class="flex flex-col items-center justify-center mb-section-gap">
<div class="relative mb-6">
<div class="absolute inset-0 bg-primary-container opacity-20 rounded-full blur-2xl"></div>
<img alt="Gym Sync Logo" class="w-24 h-24 rounded-2xl relative z-10 object-cover border border-white/10 shadow-[0_10px_30px_rgba(0,219,231,0.15)]" src="https://lh3.googleusercontent.com/aida/AP1WRLslpnDCIXL0skJ41fd_CrFWY33DdP1c9Hw2FYjXOYvOlYla7T46PYFROYW328KEy0NiiLkg9PuoapqtU1gcwUQdT4sZEG4Hy26UH85kR_IDbTKTx7-5RECqYQi_EQozL3tMdTSGFotUaNR3aqIvJSn0JOWxlzXxkPAXEzmyq4q7tnwgZHZQUc2W57OGam_ZHTqDrJNoD7F4UM4PDiL5Xv2Od3Bjb1k2uce3fpr8-U9DNWI7__mi6700yCE"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary text-center">Welcome Back</h1>
<p class="text-on-surface-variant mt-2 text-center">Sync your physical wellness.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-unit">
<!-- Email/Username Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors z-20">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container/50 border border-white/10 rounded-xl text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:bg-surface-container/80 transition-all font-body-md relative z-10" placeholder="Email or Username" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group mt-2">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors z-20">lock</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container/50 border border-white/10 rounded-xl text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:bg-surface-container/80 transition-all font-body-md relative z-10" placeholder="Password" required="" type="password"/>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-2 mb-6">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-lg-mobile text-[16px] font-bold hover:bg-primary-fixed transition-all duration-300 active:scale-95 glow-effect" type="submit">
                Login
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-px bg-white/10 flex-1"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">OR CONTINUE WITH</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-4">
<button class="w-full h-14 glass-card rounded-xl flex items-center justify-center gap-3 hover:bg-white/5 transition-colors active:scale-95">
<img class="w-5 h-5 object-contain" data-alt="A small, high-fidelity Apple logo rendered in pure white, designed as a minimalist UI icon suitable for a dark-mode login screen, sharp edges, no background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeeVh9k-0oJf8TWsY1TE7Pv76gbzIDsqEAOmxgKtnJ98_Bp6xt8auzhI3k0zWBqZzx_QxRAfSPS1DE_RFYuXdLGbESuHsBtjSxnzowC8eQCWVrjneBULTqGAX8i1GK9-E0hZrQFSstg6W9JO2Ab34K55DTOyoWT9d_MyIhOeWYp1Z8C9k28-5wti93iSWFtiWA-KAf-tWX5Ix7VnRgWsGIRbznqT5Woso6qto_qXMkf4txq2_01lh5WbYuvvHIQwiponuUn-xhDE0x"/>
<span class="font-headline-lg-mobile text-[16px] text-on-surface">Continue with Apple</span>
</button>
<button class="w-full h-14 glass-card rounded-xl flex items-center justify-center gap-3 hover:bg-white/5 transition-colors active:scale-95">

<span class="font-headline-lg-mobile text-[16px] text-on-surface">Continue with Google</span>
</button>
</div>
<!-- Sign Up Link -->
<div class="mt-section-gap text-center">
<p class="text-on-surface-variant">Don't have an account? <a class="text-primary hover:text-primary-fixed transition-colors font-semibold" href="#">Sign Up</a></p>
</div>
</main>
</body></html>
