<!DOCTYPE html>

                        "on-surface": "#dce4e4",

                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "gutter": "16px",
                        "container-margin": "24px",
                        "card-padding": "24px",
                        "unit": "8px",
                        "section-gap": "48px"

                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-caps": ["Geist"],
                        "metric-xl": ["Geist"],

<style>
        .pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Ambient Background Lighting (Ethereal feel) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary-fixed-dim/20 rounded-full blur-[100px] mix-blend-screen animate-[pulse_8s_ease-in-out_infinite]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-tertiary-container/10 rounded-full blur-[120px] mix-blend-screen animate-[pulse_10s_ease-in-out_infinite_reverse]"></div>
<!-- Full screen glass blur overlay -->
<div class="absolute inset-0 bg-surface/40 backdrop-blur-[40px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center flex-1 w-full px-container-margin">
<!-- Logo Area -->
<div class="relative flex items-center justify-center mb-8">
<!-- Glow behind logo -->
<div class="absolute inset-0 bg-primary-fixed-dim/30 rounded-full blur-[30px] pulse-slow"></div>
<!-- Logo Image -->
<img alt="Gym Sync Logo" class="w-32 h-32 md:w-48 md:h-48 object-contain relative z-10 pulse-slow shadow-[0px_10px_30px_rgba(0,219,231,0.2)] rounded-3xl border border-white/10 bg-surface-container/50 backdrop-blur-xl p-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUQTYOo7lk6cRyeno2aM9NRkyl9lg1lo1f_pSyhMTj_RE7x7iMc2sPY-sCZHyE4GuilQOUKTv-l_8v5jafiMDdrFnLOaN6ztOl8S8-D9OLpL7jn2zCiNcaZ3QfPv3XMdH2s5nC-RUlbiDyXp8W9YCe33hIZOzN6rj03y9tof2I6JLMERbrthJ2V2XbPx3SsYaYpSgiIMnZXNZ4kz6buDThYVzhe4K2Iux4sNRza0bXoMgbVL8k5GvDfP1fTNXm5zWbMExr_4D-b4Ko"/>
</div>
<!-- Typography -->
<div class="text-center space-y-4">
<h1 class="font-hero-display text-hero-display text-on-surface tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-on-surface-variant drop-shadow-sm">
                Gym Sync
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant font-light tracking-wide max-w-xs mx-auto">
                Premium AI Fitness Coach
            </p>
</div>
<!-- Loading Indicator -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-fixed-dim shimmer rounded-full w-1/2"></div>
</div>
</main>
<!-- Footer -->
<footer class="relative z-10 pb-8 text-center w-full">
<p class="font-label-caps text-label-caps text-on-surface-variant/50 uppercase tracking-[0.2em]">
            By AI Dynamics
        </p>
</footer>
</body></html>
